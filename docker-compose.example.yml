# Example: proxy + JacRed on the same Docker network.
# Copy to docker-compose.yml and adjust URLs/secrets.

services:
  jacred-proxy:
    build: .
    image: jacred-proxy:latest
    ports:
      - "5002:5002"
    environment:
      # Required when JacRed runs in another container (not 127.0.0.1 inside this container)
      JACRED_BASE_URL: "http://jacred:9117"
      # Do not commit real keys; use env_file or Docker secrets at deploy time
      JACRED_APIKEY: ""
      JACRED_TIMEOUT: "20"
      JACRED_MERGE_V1: "true"
      JACRED_STRIP_YEAR: "false"
      JACRED_ENRICH_TITLES: "true"
      LOG_LEVEL: "INFO"
      LOG_FILE: "/tmp/jacred_proxy.log"
      HOST: "0.0.0.0"
      PORT: "5002"
      GUNICORN_WORKERS: "2"
      GUNICORN_TIMEOUT: "30"
    depends_on:
      - jacred
    restart: unless-stopped

  jacred:
    # Replace with your JacRed image / build
    image: ghcr.io/jacred-fdb/jacred:latest
    ports:
      - "9117:9117"
    restart: unless-stopped
